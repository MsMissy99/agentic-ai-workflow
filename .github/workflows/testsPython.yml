###############################################################################
# Workflow: Python Unit Tests
#
# Purpose:
#   Runs Python unit tests automatically on pull requests and pushes to main/next.
#
# Triggers:
#   - On push to main or next branches (Python files only)
#   - On pull requests affecting Python files
#   - Manual dispatch
#
# Key Steps:
#   1. Checkout repository code
#   2. Set up Python environment using a custom action
#   3. Run unit tests and report results
#
# Notes:
#   - secrets are set in https://github.com/smarter-sh/smarter/settings/secrets/actions
#   - Integrates with Codecov for coverage reporting
###############################################################################
name: Python Unit Tests

on:
  workflow_dispatch: # Allows the workflow to be manually triggered from the GitHub Actions tab
  pull_request: #
    paths: # Trigger workflow on pull requests, but
      - "**.py" # only if Python files are changed
  push:
    branches: #
      - main #
      - next # Trigger workflow on pushes to main and next
    paths: # branches, but only if Python files are changed
      - "**.py" #

env:
  python-version: "3.13"

jobs:
  # Job #1: Run Python unit tests
  #
  # This job will run on an Ubuntu runner and execute the Python
  # tests by using a custom action located in ./.github/actions/tests/python.
  python-unit-tests:
    runs-on: ubuntu-latest # the runner (remote machine) will use Ubuntu OS
    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v6

      - name: Run Python tests
        uses: ./.github/actions/tests/python
        with:
          environment: "local"
          python-version: "${{ env.python-version}}"
          openai-api-organization: "${{ secrets.OPENAI_API_ORGANIZATION }}"
          openai-api-key: "${{ secrets.OPENAI_API_KEY }}"
          mysql-host: "${{ secrets.MYSQL_HOST }}"
          mysql-port: "${{ secrets.MYSQL_PORT }}"
          mysql-user: "${{ secrets.MYSQL_USER }}"
          mysql-password: "${{ secrets.MYSQL_PASSWORD }}"
          mysql-database: "${{ secrets.MYSQL_DATABASE }}"
          mysql-charset: "${{ secrets.MYSQL_CHARSET }}"
          codecov-token: "${{ secrets.CODECOV_TOKEN }}"

  # Job #2: Notifications (Mini-capstone assignment)
  # This job will run after the Python unit tests
  # and is scaffolded to facilitate sending notifications based
  # on the test results.
  notifications:
    needs: python-unit-tests # wait for the python-unit-tests job to finish first
    if: ${{ always() }} # still run this job even if the earlier job failed
    runs-on: ubuntu-latest # use GitHub's Ubuntu runner
    permissions:
      issues: write # allow this job to create a GitHub issue as the notification
    steps:
      - name: Notify on test results # label shown in the Actions screen
        run: | # start a multi-line shell script
          if [ "${{ needs.python-unit-tests.result }}" == "success" ]; then # if the test job passed
            echo "success notifications go here" # write a success message into the workflow log
          else # otherwise, the test job failed
            echo "failure notifications go here" # write a failure message into the workflow log
            curl -L \ # call the GitHub API
              -X POST \ # send a POST request to create something
              -H "Accept: application/vnd.github+json" \ # tell GitHub we want to use its JSON API
              -H "Authorization: Bearer ${{ github.token }}" \ # use the built-in GitHub token for permission
              https://api.github.com/repos/${{ github.repository }}/issues \ # send the request to this repo's issues area
              -d "{\"title\":\"Python Unit Tests failed\",\"body\":\"The Python Unit Tests workflow failed. Please check the Actions tab.\"}" # create an issue with a simple title and body
          fi # end the if statement

    

          

  
